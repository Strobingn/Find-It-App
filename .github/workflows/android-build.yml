name: Build Find It APK

# Manual: Actions → "Build Find It APK" → Run workflow → pick main or grok
# CLI:    gh workflow run "Build Find It APK" --ref main
#         gh workflow run "Build Find It APK" --ref grok
on:
  push:
    branches: [ main, master, grok ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Ensure .env for secrets plugin
        run: |
          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi
          # Empty .env is fine when the app does not require secrets for debug builds.
          touch .env

      - name: Ensure Android debug keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          # Project-local debug.keystore used by some branches
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ ! -f debug.keystore ]; then
            cp "$HOME/.android/debug.keystore" debug.keystore
          fi

      - name: Unit tests
        continue-on-error: true
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: find-it-debug-${{ github.ref_name }}-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK (unsigned OK)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: find-it-release-${{ github.ref_name }}-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
